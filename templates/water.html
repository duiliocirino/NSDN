<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ title }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% if inline_css %}
  <style>{{ css }}</style>
  {% else %}
  <link rel="stylesheet" href="{{ css_url }}">
  {% endif %}
</head>
<body>
  <main>
    <header>
      <h1>{{ title }}</h1>
      <time datetime="{{ date }}">{{ date }}</time>
    </header>
    {{ content | safe }}
  </main>
</body>
</html>
